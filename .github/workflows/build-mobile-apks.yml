name: Build Mobile APKs

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-mobile-apks.yml"

jobs:
  build:
    name: Build ${{ matrix.app }} APK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin-app, worker-app, customer-app]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: mobile/${{ matrix.app }}
        run: npm install

      - name: Sync Capacitor (copy www + config into native project)
        working-directory: mobile/${{ matrix.app }}
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: mobile/${{ matrix.app }}/android
        run: chmod +x gradlew

      # 내부 배포(사이드로드)용 — 디버그 서명은 Android SDK가 자동 생성하는 debug keystore를
      # 사용해 별도 서명 키 없이 바로 설치 가능한 APK를 만든다. 구글 플레이 출시가 필요해지면
      # release 서명 키를 별도로 준비해 assembleRelease로 전환해야 한다.
      - name: Build debug APK
        working-directory: mobile/${{ matrix.app }}/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK (workflow artifact — GitHub 로그인 필요)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug-apk
          path: mobile/${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk

      # dkansim.com의 각 앱 화면에서 로그인 없이 바로 다운받을 수 있도록, 고정 경로로
      # Supabase Storage(공개 버킷)에도 업로드한다. x-upsert로 매번 같은 파일을 덮어써
      # 다운로드 링크가 새 빌드가 나와도 바뀌지 않는다.
      - name: Upload APK to Supabase Storage (dkansim.com 직접 다운로드용)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X POST "$NEXT_PUBLIC_SUPABASE_URL/storage/v1/object/dk-safety-apks/${{ matrix.app }}.apk" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@mobile/${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk" \
            --fail-with-body
