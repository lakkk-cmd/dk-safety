name: Cursor Background Agent PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cursor-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CURSOR_API_KEY가 없으면 게이트를 막지 않고 success로 처리
      - name: Check CURSOR_API_KEY
        id: check-key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set success status (CURSOR_API_KEY not configured)
        if: steps.check-key.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            --method POST \
            --field state=success \
            --field context=cursor-review \
            --field description="Cursor 리뷰 비활성화 — CURSOR_API_KEY 미설정"

      - name: Get PR diff
        if: steps.check-key.outputs.skip == 'false'
        id: get-diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DIFF=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            -H "Accept: application/vnd.github.v3.diff" 2>/dev/null | head -c 8000)
          {
            echo "diff<<DIFF_EOF"
            echo "$PR_DIFF"
            echo "DIFF_EOF"
          } >> $GITHUB_OUTPUT

      - name: Request Cursor Background Agent review
        if: steps.check-key.outputs.skip == 'false'
        id: cursor-request
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DIFF: ${{ steps.get-diff.outputs.diff }}
          PR_REPO: ${{ github.repository }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          RESPONSE=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --arg diff "$PR_DIFF" \
            --arg repo "$PR_REPO" \
            --arg ref "$PR_REF" \
            '{
              prompt: {
                text: (
                  "PR 코드 리뷰를 수행하라.\n\n" +
                  "## PR 제목\n" + $title + "\n\n" +
                  "## PR 설명\n" + $body + "\n\n" +
                  "## 변경 코드(diff)\n" + $diff + "\n\n" +
                  "## 리뷰 지침\n" +
                  "- dkansim.com(대경안심전기) Next.js 15 + Supabase 프로젝트의 코드 품질, 보안, 성능을 검토하라.\n" +
                  "- 심각한 버그, 보안 취약점, TypeScript 타입 오류, 기존 패턴 위반이 있으면 코드 수정 후 완료하라.\n" +
                  "- 코드가 양호하면 변경 없이 완료하라."
                )
              },
              source: {repository: $repo, ref: $ref}
            }' | curl -s -X POST "https://api.cursor.com/v0/agents" \
              -H "Authorization: Bearer $CURSOR_API_KEY" \
              -H "Content-Type: application/json" \
              -d @-)

          AGENT_ID=$(echo "$RESPONSE" | jq -r '.id // ""')
          if [ -z "$AGENT_ID" ]; then
            echo "Cursor API 호출 실패: $RESPONSE" >&2
          else
            echo "Cursor 에이전트 생성: $AGENT_ID"
          fi
          echo "agent_id=$AGENT_ID" >> $GITHUB_OUTPUT

      - name: Poll for Cursor agent completion
        if: steps.check-key.outputs.skip == 'false' && steps.cursor-request.outputs.agent_id != ''
        id: cursor-result
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_ID: ${{ steps.cursor-request.outputs.agent_id }}
        run: |
          FINAL_STATUS=""
          AGENT_URL=""

          for i in $(seq 1 30); do
            sleep 20
            RESPONSE=$(curl -s "https://api.cursor.com/v0/agents/$AGENT_ID" \
              -H "Authorization: Bearer $CURSOR_API_KEY")
            FINAL_STATUS=$(echo "$RESPONSE" | jq -r '.status // ""')
            echo "폴링 ${i}/30: status=$FINAL_STATUS"
            if [ "$FINAL_STATUS" = "FINISHED" ] || [ "$FINAL_STATUS" = "ERROR" ]; then
              AGENT_URL=$(echo "$RESPONSE" | jq -r '.target.url // ""')
              break
            fi
          done

          echo "final_status=$FINAL_STATUS" >> $GITHUB_OUTPUT
          echo "agent_url=$AGENT_URL" >> $GITHUB_OUTPUT

      - name: Post review comment and set commit status
        if: steps.check-key.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINAL_STATUS: ${{ steps.cursor-result.outputs.final_status }}
          AGENT_ID: ${{ steps.cursor-request.outputs.agent_id }}
          AGENT_URL: ${{ steps.cursor-result.outputs.agent_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$AGENT_ID" ]; then
            COMMIT_STATE="failure"
            DESCRIPTION="Cursor 에이전트 생성 실패"
            COMMENT="⚠️ **Cursor 에이전트 생성 실패** — Cursor API 키 또는 요청을 확인해주세요."
          elif [ "$FINAL_STATUS" = "FINISHED" ]; then
            COMMIT_STATE="success"
            DESCRIPTION="Cursor 리뷰 완료 (FINISHED)"
            if [ -n "$AGENT_URL" ]; then
              COMMENT=$(printf '✅ **Cursor 리뷰 완료**\n\n에이전트 세션: %s' "$AGENT_URL")
            else
              COMMENT="✅ **Cursor 리뷰 완료** — 에이전트가 PR을 성공적으로 검토했습니다."
            fi
          elif [ "$FINAL_STATUS" = "ERROR" ]; then
            COMMIT_STATE="failure"
            DESCRIPTION="Cursor 에이전트 오류"
            COMMENT="❌ **Cursor 에이전트 오류** — 에이전트 실행 중 오류가 발생했습니다."
          else
            COMMIT_STATE="failure"
            DESCRIPTION="Cursor 리뷰 타임아웃 — 수동 확인 필요"
            COMMENT="⚠️ **Cursor 리뷰 타임아웃** — 수동으로 PR을 확인하고 머지해주세요."
          fi

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

          gh api "repos/$GH_REPO/statuses/$PR_HEAD_SHA" \
            --method POST \
            --field state="$COMMIT_STATE" \
            --field context=cursor-review \
            --field description="$DESCRIPTION"
