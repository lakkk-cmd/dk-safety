name: Web Search Auto Learn

on:
  schedule:
    # 매주 일요일 새벽 3시 (KST) = UTC 18:00 토요일
    - cron: '0 18 * * 6'
  workflow_dispatch: # 수동 실행 가능

jobs:
  learn-electric:
    name: 전기법령 + 전기기술
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 전기법령
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"전기법령"}' \
            --max-time 280 \
            --fail-with-body
      - name: 전기기술
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"전기기술"}' \
            --max-time 280 \
            --fail-with-body

  learn-content:
    name: 유튜브 + 마케팅
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 유튜브
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"유튜브"}' \
            --max-time 280 \
            --fail-with-body
      - name: 마케팅
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"마케팅"}' \
            --max-time 280 \
            --fail-with-body

  learn-ai-biz:
    name: AI자동화 + 사업경영
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: AI자동화
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"AI자동화"}' \
            --max-time 280 \
            --fail-with-body
      - name: 사업경영
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"사업경영"}' \
            --max-time 280 \
            --fail-with-body

  learn-general:
    name: 일반
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 일반
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"일반"}' \
            --max-time 280 \
            --fail-with-body
