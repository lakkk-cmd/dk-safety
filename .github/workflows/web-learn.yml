name: Web Search Auto Learn

on:
  schedule:
    # 매주 일요일 새벽 3시 (KST) = UTC 18:00 토요일
    - cron: '0 18 * * 6'
  workflow_dispatch: # 수동 실행 가능

jobs:
  learn-electric:
    name: 전기법령 + 전기기술
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 전기법령
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"전기법령"}' \
            --max-time 280 \
            --fail-with-body
      - name: 전기기술
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"전기기술"}' \
            --max-time 280 \
            --fail-with-body

  learn-content:
    name: 유튜브 + 마케팅
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 유튜브
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"유튜브"}' \
            --max-time 280 \
            --fail-with-body
      - name: 마케팅
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"마케팅"}' \
            --max-time 280 \
            --fail-with-body

  learn-ai-biz:
    name: AI자동화 + 사업경영
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: AI자동화
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"AI자동화"}' \
            --max-time 280 \
            --fail-with-body
      # "사업경영"은 세부항목이 21개(검색어 약 85개)라 한 번에 요청하면 서버
      # maxDuration(300s)/curl --max-time(280s)을 둘 다 넘겨 실제로 타임아웃이
      # 재현됐다 — 세부항목(subcategory) 단위로 쪼개 순차 호출한다.
      - name: 사업경영 (세부항목별로 분할 호출)
        run: |
          SUBCATEGORIES=(
            "창업" "운영" "성장"
            "세금신고" "장부관리" "절세전략" "급여"
            "채용" "계약" "노무관리" "4대보험"
            "창업지원" "금융지원" "기술지원" "판로지원"
            "계약서" "분쟁" "규정준수"
            "사업자보험" "작업자보험" "생명/건강"
          )
          for sub in "${SUBCATEGORIES[@]}"; do
            echo "▶ 사업경영 - $sub"
            curl -X POST https://dkansim.com/api/knowledge/web-learn \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
              -d "{\"mode\":\"both\",\"category\":\"사업경영\",\"subcategory\":\"$sub\"}" \
              --max-time 120 \
              --fail-with-body
          done

  learn-general:
    name: 일반
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 일반
        run: |
          curl -X POST https://dkansim.com/api/knowledge/web-learn \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_WRITE_SECRET }}" \
            -d '{"mode":"both","category":"일반"}' \
            --max-time 280 \
            --fail-with-body
