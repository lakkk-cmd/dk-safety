name: Flux Scene Completion

on:
  workflow_dispatch:
    inputs:
      queue_id:
        description: "content_youtube_queue.id (빈 값이면 producing 상태 전체 처리)"
        required: false
        type: string

jobs:
  complete-flux:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # 씬당 최대 2회 재시도 × 최대 8씬

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Flux 씬 이미지 생성 (Vercel API 씬별 호출)
        run: node scripts/complete-flux-scenes.mjs "${{ inputs.queue_id || '' }}"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENT_WRITE_SECRET: ${{ secrets.AGENT_WRITE_SECRET }}
