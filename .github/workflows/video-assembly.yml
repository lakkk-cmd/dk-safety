name: Video Assembly Pipeline

# NOTE: Veo API 직접 호출 보류 결정으로 스케줄 비활성화 (2026-06-29)
# Google Flow 수동 방식으로 전환. 수동 실행(workflow_dispatch)은 유지.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *" # 매일 07:00 KST

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -U edge-tts

      - name: ffmpeg + 한글 자막용 폰트 + tesseract-ocr(한국어) 설치
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk tesseract-ocr tesseract-ocr-kor

      - name: 영상 합성 + (연동 시) 유튜브 업로드
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: node scripts/assemble-video.mjs
