name: AI Improvement - Deploy & Notify

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'ai-improvement/issue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract issue number
        id: issue
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "number=${BRANCH##*-}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes

      - name: Notify hq.dkansim.com (success)
        if: success()
        run: |
          curl -sf -X POST "https://dkansim.com/api/admin/improvement-requests/complete" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d "{\"issueNumber\": ${{ steps.issue.outputs.number }}, \"prUrl\": \"${{ github.event.pull_request.html_url }}\"}"

      - name: Notify hq.dkansim.com (failure)
        if: failure()
        run: |
          curl -sf -X POST "https://dkansim.com/api/admin/improvement-requests/complete" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d "{\"issueNumber\": ${{ steps.issue.outputs.number }}, \"error\": \"Vercel 배포 실패 — GitHub Actions 로그를 확인하세요.\"}"
