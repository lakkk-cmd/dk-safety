name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # 실제 CI 실행으로 오탐 없음 확인됨(2026-07-10, run 29129366687: "no leaks found") — 차단 게이트로 승격.
      - name: 시크릿 유출 스캔 (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git -v --exit-code 1
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_BUSINESS_PHONE: "010-0000-0000"
          NEXT_PUBLIC_KAKAO_OPENCHAT_URL: "https://open.kakao.com/"
          ADMIN_PASSWORD: "ci-placeholder"
